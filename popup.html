<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>QISPlus</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 210px;
            font-family: sans-serif;
            font-size: 13px;
            background: #f7fbff;
            color: #222;
            padding: 12px 14px;
            user-select: none;
        }

        .qp-header {
            font-weight: 700;
            font-size: 0.95em;
            color: #115E67;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qp-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .qp-label {
            font-weight: 500;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 21px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #ccc;
            border-radius: 21px;
            transition: background 0.2s;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 15px;
            width: 15px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        input:checked + .slider {
            background: #ca5116;
        }

        input:checked + .slider::before {
            transform: translateX(17px);
        }

        /* Status text */
        .qp-status {
            font-size: 0.80em;
            margin-top: 2px;
            text-align: right;
        }

        .qp-status.active {
            color: #ca5116;
            font-weight: 600;
        }

        .qp-status.inactive {
            color: #999;
        }

        hr {
            border: none;
            border-top: 1px solid #dde4ef;
            margin: 8px 0;
        }

        .qp-version {
            font-size: 0.72em;
            color: #aaa;
            text-align: right;
        }
    </style>
</head>
<body>
<div class="qp-header">📊 QISPlus</div>

<div class="qp-row">
    <span class="qp-label">Notenübersicht</span>
    <label class="switch">
        <input id="qp-toggle" type="checkbox"/>
        <span class="slider"></span>
    </label>
</div>

<div class="qp-status" id="qp-status">Aktiv</div>

<hr/>
<div class="qp-version">v0.6.0</div>

<script src="popup.js"></script>
</body>
</html>

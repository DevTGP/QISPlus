<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>QISPlus</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 230px;
            font-family: sans-serif;
            font-size: 13px;
            background: #f7fbff;
            color: #222;
            padding: 12px 14px;
            user-select: none;
        }

        .qp-header {
            font-weight: 700;
            font-size: 0.95em;
            color: #115E67;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qp-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .qp-label {
            font-weight: 500;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 21px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #ccc;
            border-radius: 21px;
            transition: background 0.2s;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 15px;
            width: 15px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        input:checked + .slider {
            background: #ca5116;
        }

        input:checked + .slider::before {
            transform: translateX(17px);
        }

        /* Status text */
        .qp-status {
            font-size: 0.80em;
            margin-top: 2px;
            text-align: right;
        }

        .qp-status.active {
            color: #ca5116;
            font-weight: 600;
        }

        .qp-status.inactive {
            color: #999;
        }

        hr {
            border: none;
            border-top: 1px solid #dde4ef;
            margin: 8px 0;
        }

        .qp-version {
            font-size: 0.72em;
            color: #aaa;
            text-align: right;
        }

        /* ---------- ECTS input ---------- */
        .qp-ects-input {
            width: 60px;
            padding: 2px 6px;
            border: 1px solid #ccd3df;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: inherit;
            color: #222;
            background: #fff;
            text-align: right;
            outline: none;
            transition: border-color 0.15s;
        }

        .qp-ects-input:focus {
            border-color: #ca5116;
        }

        /* spin buttons are distracting in such a narrow field – hide them */
        .qp-ects-input::-webkit-outer-spin-button,
        .qp-ects-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .qp-ects-input[type=number] {
            -moz-appearance: textfield;
        }

        /* ---------- Update banner ---------- */
        .qp-update {
            display: none;            /* shown by popup.js when an update exists */
            background: #fff8e1;
            border: 1px solid #ffd54f;
            border-radius: 5px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 0.82em;
            line-height: 1.4;
        }

        .qp-update-title {
            font-weight: 700;
            color: #b8860b;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .qp-update-body {
            color: #5b3e00;
            margin-bottom: 7px;
        }

        .qp-update-body b { color: #ca5116; }

        .qp-update-btn {
            display: inline-block;
            padding: 4px 9px;
            background: #ca5116;
            color: #fff;
            text-decoration: none;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.95em;
            transition: background 0.15s;
        }

        .qp-update-btn:hover {
            background: #a33e0f;
        }
    </style>
</head>
<body>
<div class="qp-header">📊 QISPlus</div>

<div class="qp-update" id="qp-update" role="status" aria-live="polite"></div>

<div class="qp-row">
    <span class="qp-label">Notenübersicht</span>
    <label class="switch">
        <input id="qp-toggle" type="checkbox"/>
        <span class="slider"></span>
    </label>
</div>

<div class="qp-status" id="qp-status">Aktiv</div>

<div class="qp-row" style="margin-top:10px;">
    <span class="qp-label">Gesamt-ECTS</span>
    <input class="qp-ects-input" id="qp-total-ects" max="999" min="1" step="1" type="number" value="180"/>
</div>

<hr/>
<div class="qp-version" id="qp-version">v–</div>

<script src="popup.js" type="module"></script>
</body>
</html>
